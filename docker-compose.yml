version: '3.8'

services:
  # --- THE BIG CONTAINER ---
  asr_app:
    build: .
    container_name: medical_asr_system
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY} # need to add using hospital email for registering this
      - ASR_HOST=127.0.0.1
      - ASR_PORT=8000
      - INTERFACE_PORT=7860
      - MODEL_DIR=/app/models
      # Environment variables for Gradio
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    ports:
      - "7860:7860"  # Opens the Web Interface
      - "8000:8000"  # Opens the API 
    volumes:
      # 1. Mount the offline models (Crucial for API)
      - ./medical_api/models/vi_offline:/app/models/vi_offline
      - ./medical_api/models/dia_seg:/app/models/dia_seg
      - ./medical_api/models/dia_embed:/app/models/dia_embed
      
      # 2. Persist Data
      - ./saved_transcripts:/app/saved_transcripts
      - ./vibert_pipeline/vibert_cache:/app/vibert_cache
    
      
    # GPU Configuration (Dynamic)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- THE NGINX CONFIG ---
  nginx:
    image: nginx:latest
    container_name: medical_asr_nginx
    restart: always
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - asr_app