version: '3.8'

services:
  # --- THE BIG CONTAINER ---
  asr_app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: medical_asr_system
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ASR_HOST=127.0.0.1
      - ASR_PORT=8000
      - MODEL_DIR=/app/models
      - USE_GPU=false  # Default to CPU, override in docker-compose.gpu.yml
    ports:
      - "8000:8000"  # API only (frontend served by nginx)
    volumes:
      # 1. Mount the offline models (Crucial for API)
      - ../medical_api/models/vi_offline:/app/models/vi_offline
      - ../medical_api/models/dia_seg:/app/models/dia_seg
      - ../medical_api/models/dia_embed:/app/models/dia_embed
      
      # 2. Persist Data
      - ../saved_transcripts:/app/saved_transcripts
      - ../vibert_cache:/app/vibert_cache

  # --- THE NGINX CONFIG ---
  nginx:
    image: nginx:latest
    container_name: medical_asr_nginx
    restart: always
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../certs:/etc/nginx/certs
      - ../frontend:/usr/share/nginx/html  # Serve frontend files
    depends_on:
      - asr_app